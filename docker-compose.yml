services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: aitos
      POSTGRES_PASSWORD: aitos
      POSTGRES_DB: aitos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitos -d aitos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.10-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6333/healthz | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10.24-alpine
    command: "-js -m 8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data/jetstream
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  event-bus:
    build:
      context: .
      dockerfile: services/event-bus/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HTTP_ADDR=:8080
      - NATS_URL=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  model-router:
    build:
      context: .
      dockerfile: services/model-router/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - HTTP_ADDR=:8082
      - NATS_URL=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  qdrant_data:
  nats_data:
